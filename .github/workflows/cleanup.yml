name: Cleanup Staging

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: raspberry-staging

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin

      - name: Cleanup staging
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RASPBERRY_SSH_KEY }}
          USER: ${{ secrets.RASPBERRY_USER }}
          HOST: ${{ secrets.RASPBERRY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host $HOST
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

          ssh -i ~/.ssh/id_rsa "$USER@$HOST" << 'REMOTEEOC'
            if [ -d ~/MyMiniLibrary-staging ]; then
              cd ~/MyMiniLibrary-staging
              docker compose down -v
              rm -rf ~/MyMiniLibrary-staging
            fi
          REMOTEEOC